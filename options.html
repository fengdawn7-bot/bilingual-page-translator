<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilingual Translator Settings</title>
  </head>
  <body>
    <main class="options-shell">
      <h1>翻译 API 设置</h1>
      <form id="settings-form">
        <label>
          翻译引擎
          <select id="provider" name="provider">
            <option value="deepl">DeepL（更快，推荐）</option>
            <option value="openai-compatible">OpenAI 兼容（复杂内容）</option>
          </select>
        </label>
        <label>
          API Key
          <input id="api-key" name="apiKey" type="password" autocomplete="off" placeholder="DeepL Auth Key 或 sk-..." />
        </label>
        <label>
          Base URL
          <input id="base-url" name="baseURL" type="url" placeholder="https://api.openai.com/v1" />
        </label>
        <label>
          Model
          <input id="model" name="model" type="text" placeholder="gpt-4o-mini" />
        </label>
        <label>
          目标语言
          <input id="target-language" name="targetLanguage" type="text" placeholder="Simplified Chinese" />
        </label>
        <div class="settings-grid">
          <label>
            每批数量
            <input id="batch-size" name="batchSize" type="number" min="4" max="50" step="1" />
          </label>
          <label>
            并发数
            <input id="concurrency" name="concurrency" type="number" min="1" max="6" step="1" />
          </label>
          <label>
            单页最多条数
            <input id="max-blocks" name="maxBlocks" type="number" min="20" max="1000" step="10" />
          </label>
        </div>
        <label class="checkbox-row">
          <input id="translate-ui-text" name="translateUIText" type="checkbox" />
          翻译按钮、链接和导航等界面文本
        </label>
        <div class="form-actions">
          <button type="submit" class="primary">保存</button>
          <button id="test-connection" type="button">测试连接</button>
        </div>
      </form>
      <p id="status" role="status">配置保存在本地浏览器。</p>
    </main>
    <script type="module" src="/src/options/main.ts"></script>
  </body>
</html>
